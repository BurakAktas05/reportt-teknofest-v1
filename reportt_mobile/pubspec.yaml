name: reportt_mobile
description: "Reportt — Akıllı Şehir İhbar Sistemi"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.2
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  camera: ^0.12.0+1
  gap: ^3.0.1
  google_fonts: ^8.0.2
  geocoding: ^4.0.0
  # V2: Çevrimdışı senkronizasyon
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  path: ^1.9.1
  # V3: Harita
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # V3: Grafik
  fl_chart: ^0.70.2
  # V3: Cached network image
  cached_network_image: ^3.4.1
  # V3: Sesli ihbar (STT)
  speech_to_text: ^7.0.0
  # V3: On-device AI (TFLite)
  tflite_flutter: ^0.11.0
  # V3: Firebase Push Notification
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  # V4: Video evidence support
  video_player: ^2.9.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/models/
