spring:
  application:
    name: complaint-app
  datasource:
    url: ${COMPLAINT_DB_URL:jdbc:postgresql://localhost:5432/violation_db}
    username: ${COMPLAINT_DB_USERNAME:postgres}
    password: ${COMPLAINT_DB_PASSWORD:2457}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: complaint_app
  flyway:
    enabled: true
    url: ${COMPLAINT_DB_URL:jdbc:postgresql://localhost:5432/violation_db}
    user: ${COMPLAINT_DB_USERNAME:postgres}
    password: ${COMPLAINT_DB_PASSWORD:2457}
    default-schema: complaint_app
    schemas: complaint_app
    create-schemas: true
  servlet:
    multipart:
      max-file-size: ${COMPLAINT_MAX_FILE_SIZE:100MB}
      max-request-size: ${COMPLAINT_MAX_REQUEST_SIZE:200MB}
  # Redis
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 5000
  # RabbitMQ
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        missing-queues-fatal: false
        retry:
          enabled: true
          max-attempts: 3
  # Autoconfigure — gerekirse exclude edilebilir
  # autoconfigure:
  #   exclude: []

# V3: Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false

app:
  security:
    jwt-secret: ${COMPLAINT_JWT_SECRET:0123456789012345678901234567890101234567890123456789012345678901}
    token-validity-minutes: ${COMPLAINT_JWT_TOKEN_VALIDITY_MINUTES:180}
  capture:
    session-validity-minutes: ${COMPLAINT_CAPTURE_SESSION_VALIDITY_MINUTES:5}
  scoring:
    verified-report-points: ${COMPLAINT_VERIFIED_REPORT_POINTS:10}
    rejected-report-penalty: ${COMPLAINT_REJECTED_REPORT_PENALTY:3}
  # V2: Güvenilir Vatandaş Kural Motoru (Modül 5)
  trust:
    bypass-threshold: ${COMPLAINT_TRUST_BYPASS_THRESHOLD:50}
    minimum-verified-reports: ${COMPLAINT_TRUST_MIN_VERIFIED:5}
  rate-limit:
    auth-capacity: ${COMPLAINT_RATE_LIMIT_AUTH_CAPACITY:20}
    auth-refill-tokens: ${COMPLAINT_RATE_LIMIT_AUTH_REFILL_TOKENS:20}
    auth-refill-minutes: ${COMPLAINT_RATE_LIMIT_AUTH_REFILL_MINUTES:1}
    report-capacity: ${COMPLAINT_RATE_LIMIT_REPORT_CAPACITY:30}
    report-refill-tokens: ${COMPLAINT_RATE_LIMIT_REPORT_REFILL_TOKENS:30}
    report-refill-minutes: ${COMPLAINT_RATE_LIMIT_REPORT_REFILL_MINUTES:1}
    default-capacity: ${COMPLAINT_RATE_LIMIT_DEFAULT_CAPACITY:60}
    default-refill-tokens: ${COMPLAINT_RATE_LIMIT_DEFAULT_REFILL_TOKENS:60}
    default-refill-minutes: ${COMPLAINT_RATE_LIMIT_DEFAULT_REFILL_MINUTES:1}
  object-storage:
    endpoint: ${COMPLAINT_OBJECT_STORAGE_ENDPOINT:https://c79c2cbf13bdc91c91c294deb7349cd3.r2.cloudflarestorage.com}
    region: ${COMPLAINT_OBJECT_STORAGE_REGION:auto}
    bucket: ${COMPLAINT_OBJECT_STORAGE_BUCKET:reportt}
    access-key: ${COMPLAINT_OBJECT_STORAGE_ACCESS_KEY:5fc8c1e05e1feb86d6146cdc57f1386b}
    secret-key: ${COMPLAINT_OBJECT_STORAGE_SECRET_KEY:b46ec8197420981ae65468545be01f15898599668f60e61cfbcbfe091cf84224}
    path-style-access-enabled: ${COMPLAINT_OBJECT_STORAGE_PATH_STYLE:true}
    auto-create-bucket: ${COMPLAINT_OBJECT_STORAGE_AUTO_CREATE_BUCKET:true}
  media-analysis:
    enabled: ${COMPLAINT_MEDIA_ANALYSIS_ENABLED:true}
    python-command: ${COMPLAINT_MEDIA_ANALYSIS_PYTHON:py}
    script-path: ${COMPLAINT_MEDIA_ANALYSIS_SCRIPT_PATH:tools/media_guard.py}
    timeout-seconds: ${COMPLAINT_MEDIA_ANALYSIS_TIMEOUT_SECONDS:20}
